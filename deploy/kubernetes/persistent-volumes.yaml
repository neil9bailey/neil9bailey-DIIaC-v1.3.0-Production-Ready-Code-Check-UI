apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: diiac-artifacts
  namespace: diiac
  labels:
    app.kubernetes.io/name: diiac
    app.kubernetes.io/component: storage
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  # storageClassName: managed-premium   # Uncomment for Azure Premium SSD
  # storageClassName: gp3               # Uncomment for AWS GP3
---
