# DIIaC Kubernetes Secrets — TEMPLATE
# ⚠ DO NOT commit real secrets to version control.
# Populate via:
#   - Azure Key Vault + CSI driver
#   - AWS Secrets Manager + ESO (External Secrets Operator)
#   - HashiCorp Vault + vault-agent-injector
#   - kubectl create secret generic diiac-secrets --from-env-file=.env
#
# Generate ADMIN_API_TOKEN:  openssl rand -hex 32
# Generate SIGNING_PRIVATE_KEY_PEM: see OFFLINE_VERIFIER_RUNBOOK.md

apiVersion: v1
kind: Secret
metadata:
  name: diiac-secrets
  namespace: diiac
  labels:
    app.kubernetes.io/name: diiac
    app.kubernetes.io/component: secrets
type: Opaque
stringData:
  # ── Runtime ────────────────────────────────────────────────────────────────
  ADMIN_API_TOKEN: "REPLACE_WITH_OPENSSL_RAND_HEX_32"
  SIGNING_PRIVATE_KEY_PEM: |
    -----BEGIN PRIVATE KEY-----
    REPLACE_WITH_ED25519_PEM
    -----END PRIVATE KEY-----

  # ── LLM integration ────────────────────────────────────────────────────────
  OPENAI_API_KEY: "REPLACE_WITH_OPENAI_KEY"

  # ── Entra ID (if AUTH_MODE=entra_jwt_rs256) ───────────────────────────────
  ENTRA_TENANT_ID: "REPLACE_WITH_TENANT_ID"
  ENTRA_CLIENT_ID: "REPLACE_WITH_CLIENT_ID"
  ENTRA_CLIENT_SECRET: "REPLACE_WITH_CLIENT_SECRET"
