name: Security Scan

on:
  schedule:
    # Run every Monday at 08:00 UTC
    - cron: "0 8 * * 1"
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  python-audit:
    name: Python dependency audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit runtime dependencies
        run: pip-audit -r requirements.txt --output json --output-file python-audit.json
        continue-on-error: true

      - name: Audit dev dependencies
        run: pip-audit -r requirements-dev.txt --output json --output-file python-dev-audit.json
        continue-on-error: true

      - name: Upload audit results
        uses: actions/upload-artifact@v4
        with:
          name: python-audit-results
          path: "*.json"
          retention-days: 30

  node-audit-bridge:
    name: Node.js audit — bridge
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install bridge dependencies
        working-directory: backend-ui-bridge
        run: npm ci

      - name: Audit bridge dependencies
        working-directory: backend-ui-bridge
        run: npm audit --json > ../bridge-audit.json || true

      - name: Upload bridge audit
        uses: actions/upload-artifact@v4
        with:
          name: bridge-audit-results
          path: bridge-audit.json
          retention-days: 30

  node-audit-frontend:
    name: Node.js audit — frontend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install frontend dependencies
        working-directory: Frontend
        run: npm ci

      - name: Audit frontend dependencies
        working-directory: Frontend
        run: npm audit --json > ../frontend-audit.json || true

      - name: Upload frontend audit
        uses: actions/upload-artifact@v4
        with:
          name: frontend-audit-results
          path: frontend-audit.json
          retention-days: 30

  codeql:
    name: CodeQL — Python static analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:python"

  codeql-js:
    name: CodeQL — JavaScript static analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript"
