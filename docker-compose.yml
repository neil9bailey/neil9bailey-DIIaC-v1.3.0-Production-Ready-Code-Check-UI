services:
  governance-runtime:
    container_name: diiac-governance-runtime
    image: python:3.11-slim
    working_dir: /workspace
    command: ["sh", "-lc", "pip install --no-cache-dir -r requirements.txt && python app.py"]
    environment:
      - STRICT_DETERMINISTIC_MODE=true
      - ENFORCE_ADMIN_AUTH=false
    volumes:
      - ./:/workspace
    expose:
      - "8000"
    restart: unless-stopped

  backend:
    container_name: diiac-backend
    build:
      context: ./backend-ui-bridge
      dockerfile: Dockerfile
      args:
        GOVERNANCE_BUILD_HASH: ${GOVERNANCE_BUILD_HASH}
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - LLM_INGESTION_ENABLED=true
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL}
      - PYTHON_BASE_URL=http://governance-runtime:8000
      - PYTHON_AUTOSTART=false
    depends_on:
      - governance-runtime
    volumes:
      - ./artefacts:/workspace/artefacts
      - ./contracts:/workspace/contracts
      - ./ledger:/workspace/ledger
      - ./templates:/workspace/templates:ro
    working_dir: /workspace/backend-ui-bridge
    command: ["node", "server.js"]
    restart: unless-stopped

  frontend:
    container_name: diiac-frontend
    build:
      context: ./Frontend
    ports:
      - "5173:5173"
    command: ["npm", "run", "dev", "--", "--host"]
    restart: unless-stopped
    depends_on:
      - backend
